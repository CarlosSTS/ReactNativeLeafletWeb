buildscript {
  repositories {
    google()
    mavenCentral()
  }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
  namespace "com.reactnativeleafletplatform"
  compileSdk safeExtGet('compileSdkVersion', 36).toInteger()

  defaultConfig {
    minSdk safeExtGet('minSdkVersion', 24).toInteger()
    targetSdk safeExtGet('targetSdkVersion', 36).toInteger()
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = '17'
  }

  sourceSets {
    main {
      assets.srcDirs = ['src/main/assets']
    }
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-android:+"
}
